<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Good Luck Cosmetics Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f8f8f8;
    }

    header {
      background: #ff4d88;
      color: white;
      text-align: center;
      padding: 20px;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .product {
      background: white;
      width: 260px;
      margin: 10px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
    }

    .product:hover {
      transform: scale(1.03);
    }

    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .product h3 {
      margin: 10px 0 5px;
    }

    .price {
      color: #444;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      margin: 10px 0 15px;
      padding: 10px 15px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .btn:hover {
      background: #1ebe5d;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #eee;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>Karnal Cosmetics Store 💄</h1>
  <p>Order directly on WhatsApp</p>
</header>

<div class="container">

  <!-- Product 1 -->
  <div class="product">
    <img src="https://images.unsplash.com/photo-1586495777744-4413f21062fa" alt="Lipstick">
    <h3>Lipstick Set</h3>
    <div class="price">₹299</div>
    <a class="btn"
       href="https://wa.me/919034770777?text=Hi%2C%20I%20want%20to%20order%20Lipstick%20Set%20(₹299).%20Please%20confirm%20availability.""
       target="_blank">
       Buy on WhatsApp
    </a>
  </div>

  <!-- Product 2 -->
  <div class="product">
    <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348" alt="Face Cream">
    <h3>Face Cream</h3>
    <div class="price">₹199</div>
    <a class="btn"
       href="https://wa.me/919034770777?text=Hi%20I%20want%20to%20order%20Face%20Cream%20(₹199)"
       target="_blank">
       Buy on WhatsApp
    </a>
  </div>

  <!-- Product 3 -->
  <div class="product">
    <img src="https://images.unsplash.com/photo-1612810436541-336d9b1c1f81" alt="Perfume">
    <h3>Perfume</h3>
    <div class="price">₹499</div>
    <a class="btn"
       href="https://wa.me/919034770777?text=Hi%20I%20want%20to%20order%20Perfume%20(₹499)"
       target="_blank">
       Buy on WhatsApp
    </a>
  </div>

</div>

<footer>
  © 2026 Karnal Cosmetics Store | Powered by WhatsApp Orders
</footer>

</body>
</html>
